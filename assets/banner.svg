<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="280" x2="900" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
  </g>

  <!-- Decorative glow -->
  <ellipse cx="450" cy="160" rx="320" ry="140" fill="#58a6ff" opacity="0.02"/>

  <!-- Left: Branding -->
  <text x="60" y="105" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#e6edf3" letter-spacing="-1">Agentify</text>
  <text x="62" y="140" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#8b949e" letter-spacing="3">AGENT INTERFACE COMPILER</text>

  <!-- Tagline -->
  <text x="62" y="178" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#58a6ff" opacity="0.9">One command. Every agent speaks your product.</text>

  <!-- Separator line -->
  <line x1="62" y1="198" x2="340" y2="198" stroke="url(#line-grad)" stroke-width="1"/>

  <!-- Input box: OpenAPI -->
  <rect x="62" y="218" width="130" height="36" rx="6" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="127" y="241" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#e6edf3" text-anchor="middle">OpenAPI Spec</text>

  <!-- Arrow -->
  <line x1="200" y1="236" x2="248" y2="236" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>
  <polygon points="248,232 256,236 248,240" fill="#58a6ff" opacity="0.6"/>

  <!-- Compiler box -->
  <rect x="262" y="218" width="82" height="36" rx="6" fill="#1c2128" stroke="#58a6ff" stroke-width="1" opacity="0.8"/>
  <text x="303" y="240" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#58a6ff" text-anchor="middle" font-weight="600">compile</text>

  <!-- Fan-out arrows -->
  <line x1="350" y1="230" x2="394" y2="222" stroke="#30363d" stroke-width="1"/>
  <line x1="350" y1="236" x2="394" y2="236" stroke="#30363d" stroke-width="1"/>
  <line x1="350" y1="242" x2="394" y2="250" stroke="#30363d" stroke-width="1"/>

  <!-- Right side: Output format cards -->
  <!-- Row 1 -->
  <g>
    <!-- MCP Server -->
    <rect x="530" y="38" width="150" height="32" rx="5" fill="#1c2128" stroke="#3fb950" stroke-width="1" opacity="0.9"/>
    <circle cx="547" cy="54" r="4" fill="#3fb950"/>
    <text x="559" y="58" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#e6edf3">MCP Server</text>

    <!-- CLAUDE.md -->
    <rect x="700" y="38" width="150" height="32" rx="5" fill="#1c2128" stroke="#f0883e" stroke-width="1" opacity="0.9"/>
    <circle cx="717" cy="54" r="4" fill="#f0883e"/>
    <text x="729" y="58" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#e6edf3">CLAUDE.md</text>

    <!-- AGENTS.md -->
    <rect x="530" y="82" width="150" height="32" rx="5" fill="#1c2128" stroke="#58a6ff" stroke-width="1" opacity="0.9"/>
    <circle cx="547" cy="98" r="4" fill="#58a6ff"/>
    <text x="559" y="102" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#e6edf3">AGENTS.md</text>

    <!-- .cursorrules -->
    <rect x="700" y="82" width="150" height="32" rx="5" fill="#1c2128" stroke="#bc8cff" stroke-width="1" opacity="0.9"/>
    <circle cx="717" cy="98" r="4" fill="#bc8cff"/>
    <text x="729" y="102" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#e6edf3">.cursorrules</text>

    <!-- Skills -->
    <rect x="530" y="126" width="150" height="32" rx="5" fill="#1c2128" stroke="#d2a8ff" stroke-width="1" opacity="0.9"/>
    <circle cx="547" cy="142" r="4" fill="#d2a8ff"/>
    <text x="559" y="146" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#e6edf3">Skills</text>

    <!-- llms.txt -->
    <rect x="700" y="126" width="150" height="32" rx="5" fill="#1c2128" stroke="#79c0ff" stroke-width="1" opacity="0.9"/>
    <circle cx="717" cy="142" r="4" fill="#79c0ff"/>
    <text x="729" y="146" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#e6edf3">llms.txt</text>

    <!-- GEMINI.md -->
    <rect x="530" y="170" width="150" height="32" rx="5" fill="#1c2128" stroke="#7ee787" stroke-width="1" opacity="0.9"/>
    <circle cx="547" cy="186" r="4" fill="#7ee787"/>
    <text x="559" y="190" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#e6edf3">GEMINI.md</text>

    <!-- A2A Card -->
    <rect x="700" y="170" width="150" height="32" rx="5" fill="#1c2128" stroke="#ffa657" stroke-width="1" opacity="0.9"/>
    <circle cx="717" cy="186" r="4" fill="#ffa657"/>
    <text x="729" y="190" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#e6edf3">A2A Card</text>

    <!-- CLI -->
    <rect x="615" y="214" width="150" height="32" rx="5" fill="#1c2128" stroke="#f778ba" stroke-width="1" opacity="0.9"/>
    <circle cx="632" cy="230" r="4" fill="#f778ba"/>
    <text x="644" y="234" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#e6edf3">CLI</text>
  </g>

  <!-- Connection lines from compile to format cards -->
  <g stroke="#30363d" stroke-width="0.8" opacity="0.5">
    <!-- Lines fanning out from a central point to each card -->
    <line x1="500" y1="160" x2="530" y2="54"/>
    <line x1="500" y1="160" x2="700" y2="54"/>
    <line x1="500" y1="160" x2="530" y2="98"/>
    <line x1="500" y1="160" x2="700" y2="98"/>
    <line x1="500" y1="160" x2="530" y2="142"/>
    <line x1="500" y1="160" x2="700" y2="142"/>
    <line x1="500" y1="160" x2="530" y2="186"/>
    <line x1="500" y1="160" x2="700" y2="186"/>
    <line x1="500" y1="160" x2="615" y2="230"/>
  </g>

  <!-- Central hub dot -->
  <circle cx="500" cy="160" r="5" fill="#58a6ff" opacity="0.8"/>
  <circle cx="500" cy="160" r="8" fill="#58a6ff" opacity="0.15"/>

  <!-- Bottom command example -->
  <rect x="62" y="272" width="420" height="28" rx="5" fill="#1c2128" stroke="#30363d" stroke-width="0.5"/>
  <text x="74" y="290" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#8b949e">$</text>
  <text x="90" y="290" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#79c0ff">npx agentify-cli</text>
  <text x="222" y="290" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#e6edf3"> transform</text>
  <text x="297" y="290" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#a5d6ff"> your-api.json</text>

  <!-- Version badge -->
  <rect x="770" y="272" width="80" height="28" rx="5" fill="#1c2128" stroke="#30363d" stroke-width="0.5"/>
  <text x="810" y="290" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#8b949e" text-anchor="middle">v0.4.0</text>
</svg>